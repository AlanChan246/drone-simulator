# 部署靜態模擬器至 GitHub Pages（僅上傳 index / css / js / assets，不含 node_modules）
name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Install pinned browser libraries
        run: npm ci --omit=dev

      - name: Prepare static site
        run: |
          mkdir -p _site
          cp index.html style.css _site/
          cp -r js assets _site/
          mkdir -p _site/node_modules/three/build _site/node_modules/three/examples/js/loaders
          mkdir -p _site/node_modules/blockly/msg
          cp node_modules/three/build/three.min.js _site/node_modules/three/build/
          cp node_modules/three/examples/js/loaders/GLTFLoader.js _site/node_modules/three/examples/js/loaders/
          cp node_modules/blockly/blockly_compressed.js node_modules/blockly/blocks_compressed.js node_modules/blockly/javascript_compressed.js _site/node_modules/blockly/
          cp node_modules/blockly/msg/en.js _site/node_modules/blockly/msg/
          cp sw.js _site/
          cp .nojekyll _site/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
